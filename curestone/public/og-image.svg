<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow circles -->
  <circle cx="900" cy="200" r="300" fill="#3b82f6" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="150" cy="500" r="200" fill="#1d4ed8" opacity="0.15" filter="url(#blur1)"/>
  
  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="200" fill="#f59e0b" rx="3"/>
  
  <!-- Main title -->
  <text x="110" y="265" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="900" fill="white" letter-spacing="-2">CureStone</text>
  
  <!-- Tagline -->
  <text x="110" y="330" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="600" fill="#f59e0b">Best Kidney Stone Laser Surgery</text>
  
  <!-- Sub tagline -->
  <text x="110" y="375" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.65)">Gurgaon &amp; Delhi NCR · No Cuts · 98% Success Rate</text>
  
  <!-- Divider -->
  <rect x="110" y="410" width="500" height="1.5" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Stats row -->
  <text x="110" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white">98%</text>
  <text x="155" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)"> Success Rate</text>
  
  <text x="320" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white">5000+</text>
  <text x="385" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)"> Patients</text>
  
  <text x="500" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white">24hr</text>
  <text x="540" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)"> Recovery</text>
  
  <!-- Call to action pill -->
  <rect x="110" y="490" width="260" height="52" rx="26" fill="#f59e0b"/>
  <text x="240" y="522" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" fill="#0f172a">Book Free Consultation</text>
  
  <!-- Phone number -->
  <text x="110" y="585" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.5)">+91 88002 63884 · curestone.in</text>
  
  <!-- Right side: Abstract kidney illustration -->
  <!-- Kidney shape -->
  <ellipse cx="1000" cy="315" rx="130" ry="170" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="960" cy="315" rx="60" ry="100" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
  
  <!-- Laser beam -->
  <line x1="780" y1="250" x2="990" y2="310" stroke="#f59e0b" stroke-width="3" opacity="0.8" stroke-dasharray="12,6"/>
  <circle cx="990" cy="310" r="12" fill="#f59e0b" opacity="0.9"/>
  <circle cx="990" cy="310" r="25" fill="#f59e0b" opacity="0.25"/>
  <circle cx="990" cy="310" r="40" fill="#f59e0b" opacity="0.1"/>
  
  <!-- Medical cross icon -->
  <rect x="880" y="170" width="28" height="8" fill="#60a5fa" rx="4" opacity="0.7"/>
  <rect x="890" y="160" width="8" height="28" fill="#60a5fa" rx="4" opacity="0.7"/>
  
  <!-- Dots pattern -->
  <circle cx="820" cy="200" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="845" cy="215" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="810" cy="230" r="2.5" fill="#3b82f6" opacity="0.35"/>
  <circle cx="1080" cy="180" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1100" cy="400" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="850" cy="430" r="2.5" fill="#f59e0b" opacity="0.3"/>
</svg>